name=JMCMotorControl
version=1.3.0
author=LAGARI A <lagariscience@gmail.com>
maintainer=LAGARI A <lagariscience@gmail.com>
sentence=Complete UDP command system for JMC integrated servo/stepper drives (Modbus-RTU / RS-485) on Controllino.
paragraph=Hardened Modbus-RTU transport (CRC-verified responses, exception detection, retries, real timeouts), unit-correct motor control (position, velocity, homing, zero/position redefinition), a non-blocking status monitor that pushes limit-switch, fault and online/offline events over UDP, and the full JMC_CONTROLLINO_V3 command set (P, PA, S, SD, B, L, BS, Z, ZO, ZS, R, I, X plus V/VA/VS/HV/H extensions). Verified against the JMC Modbus-RTU manual V2.2 and the IHSS60-R/RC datasheet. Not affiliated with JMC (Shenzhen Just Motion Control).
category=Device Control
url=https://github.com/ailagari/JMCMotorControl
architectures=avr
depends=CONTROLLINO,Ethernet
includes=JMCMotorControl.h
